<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Главная</title>
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/base.css" />
  </head>
  <body>
    <div class="d-flex flex-md-row flex-column">

      <nav class="sidebar d-flex flex-column flex-shrink-0 p-3 desktop-nav">
        <ul class="nav nav-pills flex-column mt-auto mb-auto">
            <li class="nav-item">
                <a href="index.html" class="nav-link active text-center" aria-current="page">
                    <img class="img_change_color" src="img/nav_home.svg" alt="Главная" width="50px">
                </a>
            </li>
            <li class="nav-item">
                <a href="clubs.html" class="nav-link text-center">
                    <img class="img_change_color" src="img/nav_clubs.svg" alt="Клубы" width="50px">
                </a>
            </li>
            <li class="nav-item">
                <a href="users.html" class="nav-link text-center">
                    <img class="img_change_color" src="img/nav_users.svg" alt="Пользователи" width="48px">
                </a>
            </li>
        </ul>
        <div class="text-center">
            <img class="img_change_color toggle btn p-0" src="img/theme switch.svg" width="50px" alt="Смена темы">
        </div>
    </nav>


    <nav class="mobile-nav w-100 p-3">
    <div>
        <div class="d-flex justify-content-between align-items-center">
            <button class="btn btn-outline-dark border-0 img_change_color" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasMenu" aria-controls="offcanvasMenu">
                <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" fill="currentColor" class="bi bi-list" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/>
                </svg>
            </button>
            
            <img class="img_change_color toggle btn p-0" src="img/theme switch.svg" width="40px" alt="Смена темы">
        </div>
    </div>

    <div class="offcanvas offcanvas-start main_bg p-3" tabindex="-1" id="offcanvasMenu" aria-labelledby="offcanvasMenuLabel">
        <div class="offcanvas-header">
            <button type="button" class="btn-close fs-2 img_change_color" data-bs-dismiss="offcanvas" aria-label="Закрыть"></button>
        </div>
        <div class="offcanvas-body p-1">
            <ul class="nav nav-pills flex-column fs-4 fw-semibold">
                <li class="nav-item">
                    <a href="index.html" class="nav-link nav-link_active">Главная</a>
                </li>
                <li class="nav-item">
                    <a href="clubs.html" class="nav-link">Клубы</a>
                </li>
                <li class="nav-item">
                    <a href="users.html" class="nav-link">Пользователи</a>
                </li>
            </ul>
        </div>
    </div>
    </nav>

    

      <main class="p-4 w-100">
        <div class="d-flex justify-content-end align-items-center gap-4">
          <div class="d-flex justify-content-end align-items-center gap-1">
            <p class="fs-5 fw-medium m-0">Админ</p>
            <img
              class="img_change_color"
              src="img/profile-icon.svg"
              width="60px"
              alt="Профиль"
            />
          </div>
          <button class="btn btn-light fw-medium fs-6"><a class="text-decoration-none" href="auth.html">Выйти</a></button>
        </div>

        <div class="fs-1 m-5 fw-medium"><h1>Главная</h1></div>

        <div class="container mt-5 p-0 px-md-4 dashboard_block">
          <div class="row row-cols-1 row-cols-sm-2 g-3">
            <div class="col">
              <div class="stat_card card shadow-sm border-0 p-sm-2 p-lg-3 h-100">
                <div class="card-body d-flex justify-content-between align-items-md-center align-items-stretch flex-column flex-md-row">
                  <span class="fs-4 fw-medium">Посетители за месяц</span>
                  <span class="text-purple fs-4 fw-semibold text-end">35 650</span>
                </div>
              </div>
            </div>
        
            <div class="col">
              <div class="stat_card card shadow-sm border-0 p-sm-2 p-lg-3 h-100">
                <div class="card-body d-flex justify-content-between align-items-md-center align-items-stretch flex-column flex-md-row">
                  <span class="fs-4 fw-medium">Игровых сессий за месяц</span>
                  <span class="text-purple fs-4 fw-semibold text-end">3150</span>
                </div>
              </div>
            </div>
        
            <div class="col">
              <div class="stat_card card shadow-sm border-0 p-sm-2 p-lg-3 h-100">
                <div class="card-body d-flex justify-content-between align-items-md-center align-items-stretch flex-column flex-md-row">
                  <span class="fs-4 fw-medium">Зарегистрировано пользователей</span>
                  <span class="text-purple fs-4 fw-semibold text-end">27 750</span>
                </div>
              </div>
            </div>
        
            <div class="col">
              <div class="stat_card card shadow-sm border-0 p-sm-2 p-lg-3 h-100">
                <div class="card-body d-flex justify-content-between align-items-md-center align-items-stretch flex-column flex-md-row">
                  <span class="fs-4 fw-medium">Активные сессии</span>
                  <span class="text-purple fs-4 fw-semibold text-end">94</span>
                </div>
              </div>
            </div>
        
            <div class="col">
              <div class="stat_card card shadow-sm border-0 p-sm-2 p-lg-3 h-100">
                <div class="card-body d-flex justify-content-between align-items-md-center align-items-stretch flex-column flex-md-row">
                  <span class="fs-4 fw-medium">Свободных ПК</span>
                  <span class="text-purple fs-4 fw-semibold text-end">160/285</span>
                </div>
              </div>
            </div>
        
            <div class="col">
              <div class="stat_card card shadow-sm border-0 p-sm-2 p-lg-3 h-100">
                <div class="card-body d-flex justify-content-between align-items-md-center align-items-stretch flex-column flex-md-row">
                  <span class="fs-4 fw-medium">Выручка за месяц, руб</span>
                  <span class="text-purple fs-4 fw-semibold text-end">564 000</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery-4.0.0.min.js"></script>
    <script defer src="js/theme.js"></script>
  </body>
</html>
