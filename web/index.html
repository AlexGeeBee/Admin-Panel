<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Главная</title>
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/base.css" />
  </head>
  <body>

    <div class="d-flex">
        <nav class="sidebar d-flex flex-column flex-shrink-0 p-3">
          <ul class="nav nav-pills flex-column mt-auto mb-auto">
            <li class="nav-item">
              <a href="index.html" class="nav-link active text-center" aria-current="page"><img src="img/nav_home.svg" alt="Главная" width="50px"
                /></a>
            </li>
            <li class="nav-item"><a href="clubs.html" class="nav-link text-center"><img src="img/nav_clubs.svg" alt="Клубы" width="50px"
                /></a></li>
            <li class="nav-item"><a href="users.html" class="nav-link text-center"><img src="img/nav_users.svg" alt="Пользователи" width="48px"
                /></a></li>
          </ul>

            <div class="text-center">
                <!-- <span class="toggle btn">Смена темы</span> -->
                 <img class="toggle btn p-0" src="img/theme switch.svg" width="50px" alt="Смена темы">
            </div>
        </nav>
      
        <main class="p-4 w-100">
            <div class="d-flex justify-content-end align-items-center">
              <p class="fs-5 fw-medium m-0">Админ</p>
              <img src="img/profile-icon.svg" width="70px" alt="Профиль">
            </div>
          
            <div class="fs-1 m-5 fw-medium"><h1>Главная</h1></div>


            <div class="container mt-5">
              <div class="row row-cols-2 g-3">
                <div class="col">
                  <div class="stat_card card shadow-sm border-0 p-2">
                    <div
                      class="card-body d-flex justify-content-between align-items-center"
                    >
                      <span class="fs-4 fw-medium">Посетители за месяц</span>
                      <span class="stat_num fs-4 fw-semibold">35 650</span>
                    </div>
                  </div>
                </div>
        
                <div class="col">
                  <div class="stat_card card shadow-sm border-0 p-2">
                    <div
                      class="card-body d-flex justify-content-between align-items-center"
                    >
                      <span class="fs-4 fw-medium">Игровых сессий за месяц</span>
                      <span class="stat_num fs-4 fw-semibold">3150</span>
                    </div>
                  </div>
                </div>
        
                <div class="col">
                  <div class="stat_card card shadow-sm border-0 p-2">
                    <div
                      class="card-body d-flex justify-content-between align-items-center"
                    >
                      <span class="fs-4 fw-medium">Зарегистрировано пользователей</span>
                      <span class="stat_num fs-4 fw-semibold">27 750</span>
                    </div>
                  </div>
                </div>
        
                <div class="col">
                  <div class="stat_card card shadow-sm border-0 p-2">
                    <div
                      class="card-body d-flex justify-content-between align-items-center"
                    >
                      <span class="fs-4 fw-medium">Активные сессии</span>
                      <span class="stat_num fs-4 fw-semibold">94</span>
                    </div>
                  </div>
                </div>
        
                <div class="col">
                  <div class="stat_card card shadow-sm border-0 p-2">
                    <div
                      class="card-body d-flex justify-content-between align-items-center"
                    >
                      <span class="fs-4 fw-medium">Свободных ПК</span>
                      <span class="stat_num fs-4 fw-semibold">160/285</span>
                    </div>
                  </div>
                </div>
        
                <div class="col">
                  <div class="stat_card card shadow-sm border-0 p-2">
                    <div
                      class="card-body d-flex justify-content-between align-items-center"
                    >
                      <span class="fs-4 fw-medium">Выручка за месяц, руб</span>
                      <span class="stat_num fs-4 fw-semibold">564 000</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

        </main>
    </div>
      
      

    <script src="js/jquery-4.0.0.min.js"></script>
    <script defer src="js/theme.js"></script>
  </body>
</html>
