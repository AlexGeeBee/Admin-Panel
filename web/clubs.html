<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Клубы</title>
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/base.css" />
  </head>
  <body>

    <div class="d-flex">
        <nav class="sidebar d-flex flex-column flex-shrink-0 p-3">
          <ul class="nav nav-pills flex-column mt-auto mb-auto">
            <li class="nav-item">
              <a href="index.html" class="nav-link text-center" aria-current="page"><img src="img/nav_home.svg" alt="Главная" width="50px"
                /></a>
            </li>
            <li class="nav-item"><a href="clubs.html" class="nav-link active text-center"><img src="img/nav_clubs.svg" alt="Клубы" width="50px"
                /></a></li>
            <li class="nav-item"><a href="users.html" class="nav-link text-center"><img src="img/nav_users.svg" alt="Пользователи" width="48px"
                /></a></li>
          </ul>

            <div class="text-center">
                <!-- <span class="toggle btn">Смена темы</span> -->
                 <img class="img_change_color toggle btn p-0" src="img/theme switch.svg" width="50px" alt="Смена темы">
            </div>
        </nav>
      
        <main class="p-5 w-100">
          <div class="d-flex justify-content-end align-items-center gap-4">
              <div class="d-flex justify-content-end align-items-center gap-1">
                <p class="fs-5 fw-medium m-0">Админ</p>
                <img class="img_change_color" src="img/profile-icon.svg" width="60px" alt="Профиль">
              </div>
              <button class="btn btn-light fw-medium fs-6">Выйти</button>
            </div>
            <div class="fs-1 mx-3 my-5 fw-medium"><h1>Клубы</h1></div>
            
            <table class="table_css table table-bordered fs-6 fw-medium">
                <thead>
                  <tr class="table-info">
                    <th class="p-2 text-center" scope="col">№</th>
                    <th class="p-2 text-center" scope="col">Название</th>
                    <th class="p-2 text-center" scope="col">Адрес</th>
                    <th class="p-2 text-center" scope="col">Кол-во ПК</th>
                    <th class="p-2 text-center" scope="col">Изменить</th>
                  </tr>
                </thead>

                <tbody>

                  <tr>
                    <th class="p-1 text-center align-middle" scope="row">1</th>
                    <td class="p-1 text-center align-middle">Василеостровская</td>
                    <td class="p-1 text-center align-middle">13-я линия ВО, 30</td>
                    <td class="p-1 text-center align-middle">46</td>
                    <td class="p-1 text-center align-middle"><button class="btn border-0 btn-outline-primary"><a href=""><img title="Изменить" src="img/edit.svg" width="40px" alt="изменить"></a></button></td>
                  </tr>

                  <tr>
                    <th class="p-1 text-center align-middle" scope="row">2</th>
                    <td class="p-1 text-center align-middle">Электросила</td>
                    <td class="p-1 text-center align-middle">ул. Благодатная, 40</td>
                    <td class="p-1 text-center align-middle">38</td>
                    <td class="p-1 text-center align-middle"><button class="btn border-0 btn-outline-primary"><a href=""><img title="Изменить" src="img/edit.svg" width="40px" alt="изменить"></a></button></td>
                  </tr>

                  <tr>
                    <th class="p-1 text-center align-middle" scope="row">3</th>
                    <td class="p-1 text-center align-middle">Беговая</td>
                    <td class="p-1 text-center align-middle">ул. Савушкина, 141</td>
                    <td class="p-1 text-center align-middle">30</td>
                    <td class="p-1 text-center align-middle"><button class="btn border-0 btn-outline-primary"><a href=""><img title="Изменить" src="img/edit.svg" width="40px" alt="изменить"></a></button></td>
                  </tr>

                  <tr>
                    <th class="p-1 text-center align-middle" scope="row">4</th>
                    <td class="p-1 text-center align-middle">Петроградская</td>
                    <td class="p-1 text-center align-middle">ул. Ординарная, 20</td>
                    <td class="p-1 text-center align-middle">44</td>
                    <td class="p-1 text-center align-middle"><button class="btn border-0 btn-outline-primary"><a href=""><img title="Изменить" src="img/edit.svg" width="40px" alt="изменить"></a></button></td>
                  </tr>

                  <tr>
                    <th class="p-1 text-center align-middle" scope="row">5</th>
                    <td class="p-1 text-center align-middle">Площадь Ленина</td>
                    <td class="p-1 text-center align-middle">ул. Комсомола, 17</td>
                    <td class="p-1 text-center align-middle">40</td>
                    <td class="p-1 text-center align-middle"><button class="btn border-0 btn-outline-primary"><a href=""><img title="Изменить" src="img/edit.svg" width="40px" alt="изменить"></a></button></td>
                  </tr>

                  <tr>
                    <th class="p-1 text-center align-middle" scope="row">6</th>
                    <td class="p-1 text-center align-middle">Бухарестская</td>
                    <td class="p-1 text-center align-middle">ул. Салова, 61</td>
                    <td class="p-1 text-center align-middle">48</td>
                    <td class="p-1 text-center align-middle"><button class="btn border-0 btn-outline-primary"><a href=""><img title="Изменить" src="img/edit.svg" width="40px" alt="изменить"></a></button></td>
                  </tr>

                </tbody>

            </table>

            <div class="d-grid">
              <button type="button" class="btn btn-outline-info border-2 text-dark fs-5 fw-medium">Добавить</button>
            </div>
            
        </main>
    </div>
      
      

    <script src="js/jquery-4.0.0.min.js"></script>
    <script defer src="js/theme.js"></script>
  </body>
</html>
