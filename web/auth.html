<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Авторизация</title>
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/base.css" />
  </head>
  <body>

      <div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
      
        <div class="col-12 col-md-6 col-lg-4">
          <div class="fs-1 mb-5 fw-medium text-center"><h1>Авторизация</h1></div>

          <form action="#" class="">
              
              <div class="form-floating mb-3">
                  <input type="text" class="form-control fs-5" id="login" placeholder="Логин">
                  <label class="fs-6" for="login">Логин</label>
              </div>
              
              <div class="form-floating mb-3">
                  <input type="password" class="form-control fs-5" id="password" placeholder="Password">
                  <label class="fs-6" for="password">Пароль</label>
              </div>

              <div class="text-center"><button type="submit" class="btn btn-primary w-50 mt-4 fs-5">Войти</button></div>
              
          </form>

        </div>
      </div>

      <div class="m-4">
        <!-- <span class="toggle btn">Смена темы</span> -->
         <img class="toggle btn p-0" src="img/theme switch.svg" width="50px" alt="Смена темы">
      </div>

    <script src="js/jquery-4.0.0.min.js"></script>
    <script defer src="js/theme.js"></script>
  </body>
</html>
